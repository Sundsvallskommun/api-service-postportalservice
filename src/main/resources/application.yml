spring:
  main:
    banner-mode: off
  application:
    name: api-service-postportalservice
  flyway:
    enabled: false
  cache:
    cache-names: portalPersonDataCache
    caffeine:
      spec: maximumSize=500, expireAfterWrite=600s
  jpa:
    hibernate:
      ddl-auto: none
  security:
    oauth2:
      client:
        registration:
          citizen:
            authorization-grant-type: client_credentials
            provider: citizen
          digitalregisteredletter:
            authorization-grant-type: client_credentials
            provider: digitalregisteredletter
          messagingsettings:
            authorization-grant-type: client_credentials
            provider: messagingsettings
          messaging:
            authorization-grant-type: client_credentials
            provider: messaging
          party:
            authorization-grant-type: client_credentials
            provider: party
          legalentity:
            authorization-grant-type: client_credentials
            provider: legalentity
          esigning:
            authorization-grant-type: client_credentials
            provider: esigning
openapi:
  title: Postportalservice
  name: postportalservice
  version: '@project.version@'
logging:
  config: classpath:/custom-logback.xml
resilience4j:
  circuitbreaker:
    instances:
      messagingsettings:
        ignoreExceptions: se.sundsvall.dept44.exception.ClientProblem
      messaging:
        ignoreExceptions: se.sundsvall.dept44.exception.ClientProblem
      legalentity:
        ignoreExceptions: se.sundsvall.dept44.exception.ClientProblem
      messageRepository: {}
      attachmentRepository: {}
      departmentRepository: {}
      recipientRepository: {}
      userRepository: {}
      statisticsRepository: {}
delivery:
  executor:
    # Concurrency limit towards the messaging service (the blocking call runs on the pool thread).
    # The work queue is intentionally unbounded - a recipient is never dropped; sustained overload may OOM.
    pool-size: 8
    await-termination-seconds: 30
integration:
  party:
    chunk:
      maxLegalIdsPerCall: 1000
      maxPartyIdsPerCall: 1000
